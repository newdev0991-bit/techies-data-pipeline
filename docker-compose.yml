# Local-only Postgres for development and money-free verification.
# Prod uses Render Postgres (DATABASE_URL injected by Render).
# Port 5433 on the host to avoid clashing with any local 5432 Postgres.
services:
  db:
    # Render Postgres runs 16; locally we use whatever is cached to avoid slow
    # pulls. 14-alpine supports everything this schema uses. Override with
    # POSTGRES_IMAGE=postgres:16 once that image is pulled if you want parity.
    image: ${POSTGRES_IMAGE:-postgres:14.15-alpine3.21}
    container_name: techies_pipeline_db
    environment:
      POSTGRES_USER: techies
      POSTGRES_PASSWORD: techies
      POSTGRES_DB: techies_pipeline
    ports:
      - "5433:5432"
    volumes:
      - techies_pipeline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techies -d techies_pipeline"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  techies_pipeline_pgdata:
